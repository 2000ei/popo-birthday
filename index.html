<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🎂 ပုပုရဲ့ မွေးနေ့လက်ဆောင် 🎂</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Quicksand', cursive, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fbe9f0 0%, #ffd9e8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* နောက်ခံမှာ ဖြည်းဖြည်းရွေ့နေတဲ့ မွေးနေ့ပစ္စည်းလေးတွေ */
    .floating-items {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .floating-items span {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.25;
      animation: floatAround 14s linear infinite;
      user-select: none;
    }

    @keyframes floatAround {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0.4; }
    }

    .birthday-card {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 3.5rem;
      box-shadow: 0 30px 40px rgba(210, 80, 130, 0.3), 0 0 0 2px #fff, 0 0 0 6px #fec5d0;
      padding: 2.2rem 1.8rem 2.5rem;
      text-align: center;
      position: relative;
      z-index: 10;
      border: 1px solid rgba(255, 240, 245, 0.7);
      animation: popIn 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.7); }
      80% { transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 2.5rem;
      background: linear-gradient(45deg, #ff6b8b, #ff385c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 10px #ffb0c0;
    }

    .cake-section {
      margin: 1.2rem 0 1.8rem;
      position: relative;
    }

    .cake {
      font-size: 7rem;
      line-height: 1;
      filter: drop-shadow(0 15px 10px #fba0b5);
      animation: bounce 2s infinite ease-in-out;
      display: inline-block;
      transform-origin: center;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }

    .candle {
      font-size: 2.5rem;
      position: relative;
      top: -20px;
      left: 20px;
      animation: flicker 0.5s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.9; transform: scale(1.1); }
    }

    .birthday-message {
      background: #ffe9f0;
      border-radius: 3rem;
      padding: 1.5rem 1.2rem;
      margin: 1.5rem 0 1.5rem;
      border: 3px dashed #ff98b5;
      font-size: 1.6rem;
      font-weight: 600;
      color: #b03060;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: inset 0 0 15px #ffccdd;
    }

    .highlight-text {
      background: #ffb6c1;
      border-radius: 3rem;
      padding: 0.6rem 1.8rem;
      font-size: 1.3rem;
      color: #681c3a;
      display: inline-block;
      margin: 0.5rem 0;
      font-weight: 600;
      box-shadow: 0 5px 0 #b35f7a;
    }

    .gift-box {
      background: #ffb0c0;
      border-radius: 3rem;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 2rem 0 1rem;
      border: 2px solid white;
      box-shadow: 0 8px 0 #b35f7a;
      cursor: pointer;
      transition: 0.1s;
    }

    .gift-box:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #b35f7a;
    }

    .gift-box span {
      font-size: 2.2rem;
    }

    .footer-note {
      margin-top: 2rem;
      color: #b04872;
      font-size: 1rem;
      opacity: 0.8;
    }

    .qr-note {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 3rem;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      color: #a13d61;
      margin-bottom: 1rem;
      border: 1px solid white;
    }

    /* နှိပ်လို့ရတဲ့ လက်ဆောင်သေတ္တာ */
    .hidden-surprise {
      display: none;
      background: #fff2f7;
      border-radius: 2rem;
      padding: 1rem;
      margin: 1rem 0;
      font-size: 1.2rem;
      color: #b0306e;
      border: 2px solid #ffb0c6;
    }

    .show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="floating-items" id="floatingItems"></div>

  <div class="birthday-card">
    <div class="qr-note">
      🎀 QR ဖတ်ပြီးပြီ... ပုပုအတွက် မွေးနေ့လက်ဆောင် 🎀
    </div>

    <h1>🎉 Happy Birthday Popo 🎉</h1>

    <div class="cake-section">
      <span class="cake">🎂</span>
      <span class="candle">🕯️</span>
    </div>

    <div class="birthday-message" id="mainMessage">
      ချစ်စရာ ပုပုရေ...<br>
      မွေးနေ့မှာ ပျော်ရွှင်ပါစေ 💖
    </div>

    <div class="highlight-text">
      ♡  မောင်က ပုပုကို အရမ်းချစ်တယ်  ♡
    </div>

    <!-- လက်ဆောင်သေတ္တာ (နှိပ်လို့ရ) -->
    <div class="gift-box" id="giftBox">
      <span>🎁</span>
      <span>ဒီမှာနှိပ်ပါ</span>
      <span>🎁</span>
    </div>

    <!-- လျှို့ဝှက်ချက် (အစပိုင်းမှာမပြ) -->
    <div class="hidden-surprise" id="secretMessage">
      💝 ပုပု... မောင်ပေးတဲ့ လက်ဆောင်လေးက<br>
      ဒီနှလုံးသားလေးပါပဲ<br>
      ❤️ ချစ်တယ် ပုပုရေ ❤️
    </div>

    <div class="footer-note">
      ✨ မောင်က ပုပုကို ချစ်တဲ့နေ့ ✨
    </div>
  </div>

  <script>
    (function() {
      // နောက်ခံမှာ ပစ္စည်းလေးတွေ ဖန်တီး
      function createFloatingItems() {
        const container = document.getElementById('floatingItems');
        const items = ['🎂', '🎈', '🎁', '💝', '✨', '🕯️', '🌸', '💖', '🎊', '🎉'];
        for (let i = 0; i < 18; i++) {
          const span = document.createElement('span');
          span.innerText = items[Math.floor(Math.random() * items.length)];
          span.style.left = Math.random() * 100 + '%';
          span.style.animationDelay = Math.random() * 10 + 's';
          span.style.animationDuration = 10 + Math.random() * 15 + 's';
          span.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
          container.appendChild(span);
        }
      }
      createFloatingItems();

      // လက်ဆောင်သေတ္တာနှိပ်ရင် လျှို့ဝှက်ချက်ပေါ်လာ
      const giftBox = document.getElementById('giftBox');
      const secret = document.getElementById('secretMessage');

      giftBox.addEventListener('click', function() {
        secret.classList.toggle('show');
        if (secret.classList.contains('show')) {
          // လက်ဆောင်ဖွင့်လိုက်တဲ့အခါ နောက်ခံအရောင်ဖျော့ဖျော့ပြောင်း
          document.body.style.background = 'linear-gradient(145deg, #ffe6f0, #ffcddc)';
        }
      });

      // အကယ်၍ QR ကနေလာတယ်ဆိုရင် သီချင်းဖွင့်ဖို့ (audio context လိုအပ်ရင်)
      // ဒီမှာတော့ ရိုးရှင်းအောင် ထားတယ်။
      
      // မွေးနေ့သီချင်းလေး ဖွင့်ချင်ရင် အောက်က code ကိုဖွင့်နိုင် (user interaction လိုအပ်)
      // ဒါပေမယ့် mobile မှာ autoplay မရဘူး
    })();
  </script>
</body>
</html>
